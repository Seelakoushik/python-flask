apiVersion: apps/v1

kind: Deployment

metadata:
  name: hospital-deployment

spec:

  replicas: 1

  selector:
    matchLabels:
      app: hospital-app

  template:

    metadata:
      labels:
        app: hospital-app

    spec:

      containers:

        - name: hospital-container

          image: ubuntu-hospital-web

          imagePullPolicy: Never

          ports:
            - containerPort: 5000
